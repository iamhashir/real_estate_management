name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # First push: auto-creates the Vercel project (named after the repo).
      # Subsequent pushes: re-uses the existing project.
      - name: Deploy
        id: deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_FLAGS="--prod"
          else
            DEPLOY_FLAGS=""
          fi
          URL=$(vercel \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            $DEPLOY_FLAGS \
            --env NEXT_PUBLIC_CONVEX_URL="${{ secrets.NEXT_PUBLIC_CONVEX_URL }}" \
            2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### 🚀 Live URL" >> $GITHUB_STEP_SUMMARY
          echo "$URL" >> $GITHUB_STEP_SUMMARY

      - name: Comment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🚀 Preview deployed\n**URL:** ${url}`
            });
